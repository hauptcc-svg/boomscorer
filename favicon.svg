<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark green background -->
  <rect width="100" height="100" rx="20" fill="#0a5c26"/>

  <!-- Playing card (Joker) — slightly tilted left -->
  <g transform="rotate(-10, 28, 46)">
    <rect x="7" y="14" width="42" height="58" rx="5" fill="white"/>
    <text x="28" y="36" font-family="Georgia,serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#c0392b">J</text>
    <text x="28" y="60" font-family="Arial,sans-serif" font-size="26" text-anchor="middle" fill="#1a1a1a">♣</text>
  </g>

  <!-- Dice — rotated slightly right for balance -->
  <g transform="rotate(6, 73, 50)">
    <rect x="53" y="30" width="40" height="40" rx="7" fill="white"/>
    <!-- 5 pips (cross pattern) -->
    <circle cx="63" cy="40" r="4" fill="#1a1a1a"/>
    <circle cx="83" cy="40" r="4" fill="#1a1a1a"/>
    <circle cx="73" cy="50" r="4" fill="#1a1a1a"/>
    <circle cx="63" cy="60" r="4" fill="#1a1a1a"/>
    <circle cx="83" cy="60" r="4" fill="#1a1a1a"/>
  </g>
</svg>
